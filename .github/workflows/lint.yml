# Canonical lint workflow for Noir sub-repos.
#
# Source of truth: zkp-sparql-workspace/templates/sub-repo/noir/.github/workflows/lint.yml.tmpl
# Rendered by:    zkp-sparql-workspace/scripts/sync-standards.sh
#
# Covers: Noir (fmt + check), Python (ruff), YAML (yamllint),
# shell (shellcheck + shfmt), Markdown (markdownlint), TOML (taplo),
# JSON (prettier).
#
# The existing `ci.yml` workflow keeps its `nargo fmt --check` job for
# back-compat; this file is additive. Some jobs run with
# `continue-on-error: true` while the harness lands — flip those off
# after the first cleanup pass per `STABILISATION-TODOS.md`.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff==0.7.4"
      - name: ruff check
        run: ruff check .
        continue-on-error: true
      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true

  yaml:
    name: YAML (yamllint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin to mirror the pre-commit hook (`yamllint` v1.35.1).
      - run: pip install "yamllint==1.35.1"
      - run: yamllint .
        continue-on-error: true

  json-prettier:
    name: JSON (prettier --check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pin Prettier so CI mirrors the pre-commit hook
      # (`mirrors-prettier` v4.0.0-alpha.8 → prettier@4.0.0-alpha.8).
      - run: |
          npx -y prettier@4.0.0-alpha.8 --check '**/*.json' || \
            echo "::warning::JSON formatting drift; run 'npx prettier --write **/*.json'"
        continue-on-error: true

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + shfmt
        # Pin shellcheck + shfmt to the same versions the pre-commit hook
        # uses so local + CI lint never disagree.
        env:
          SHELLCHECK_VERSION: "v0.10.0"
          SHFMT_VERSION: "v3.10.0"
        run: |
          curl -sSfL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install -m 755 "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          curl -sSfL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt
      - name: shellcheck
        run: |
          mapfile -t FILES < <(git ls-files '*.sh' '*.bash' 2>/dev/null)
          if [ ${#FILES[@]} -gt 0 ]; then
            shellcheck "${FILES[@]}"
          else
            echo "no shell files"
          fi
        continue-on-error: true
      - name: shfmt -d
        run: |
          mapfile -t FILES < <(git ls-files '*.sh' '*.bash' 2>/dev/null)
          if [ ${#FILES[@]} -gt 0 ]; then
            shfmt -i 2 -ci -d "${FILES[@]}"
          fi
        continue-on-error: true

  markdown:
    name: Markdown (markdownlint-cli2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli2@0.14.0
      - run: markdownlint-cli2
        continue-on-error: true

  toml:
    name: TOML (taplo)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install taplo
        run: |
          curl -sSfL https://github.com/tamasfe/taplo/releases/download/0.9.3/taplo-full-linux-x86_64.gz \
            | gunzip > /tmp/taplo
          sudo install -m 755 /tmp/taplo /usr/local/bin/taplo
      - name: taplo fmt --check
        run: taplo fmt --check
        continue-on-error: true
      - name: taplo lint
        run: taplo lint
        continue-on-error: true

  noir-fmt:
    name: Noir (nargo fmt --check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Read Noir versions
        id: versions
        run: |
          if [ -f .github/noir-versions.json ]; then
            echo "latest=$(jq -r '.latest' .github/noir-versions.json)" >> $GITHUB_OUTPUT
          else
            echo "latest=" >> $GITHUB_OUTPUT
          fi
      - name: Install Noir
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ steps.versions.outputs.latest }}
      - name: nargo fmt --check
        run: nargo fmt --check
        continue-on-error: true
